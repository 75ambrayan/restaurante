<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Logístico | La Jama</title>

    <th:block th:replace="~{links :: headLinks}"></th:block>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" th:href="@{/css/despacho-estilo.css}">
</head>
<body class="cocina-body">

<div class="wrapper">
    <div th:replace="~{sidebar :: sidebar(activeUri='/admin/despacho')}"></div>

    <main id="main-content" class="main-content">
        <div th:replace="~{sidebar :: logistica_header('Monitor de Rutas')}"></div>

        <div class="container-fluid py-3 px-4">
            <div class="row g-3">
                <div class="col-md-3">
                    <div class="panel-blanco shadow-sm">
                        <h6 class="panel-title"><i class="bi bi-box-seam me-2"></i>Preparados</h6>
                        <div class="scroll-v" id="col-pedidos">
                            <div th:each="p : ${pedidos}" class="tarjeta-pedido" th:id="'pedido-' + ${p.id}"
                                 th:data-id="${p.id}" th:data-cliente="${p.cliente}" th:data-direccion="${p.direccion}"
                                 th:data-lat="${p.latitud}" th:data-lng="${p.longitud}" onclick="seleccionarPedido(this)">
                                <div class="d-flex justify-content-between">
                                    <span class="id-pedido small fw-bold">#[[${p.id}]]</span>
                                    <span class="monto-pedido fw-bold">S/ [[${p.montoTotal}]]</span>
                                </div>
                                <h6 class="cliente-nombre mb-1 fw-bold" style="font-family: 'Vollkorn';">[[${p.cliente}]]</h6>
                                <p class="direccion-texto small text-muted mb-0">[[${p.direccion}]]</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="panel-blanco p-0 overflow-hidden shadow-sm" style="border: 2px solid var(--lajama-green);">
                        <div id="mapa-principal" style="height: 100%; width: 100%;"></div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="panel-blanco shadow-sm">
                        <h6 class="panel-title"><i class="bi bi-person-badge me-2"></i>Personal</h6>
                        <div class="scroll-v" id="col-repartidores">
                            <div th:each="r, iterStat : ${repartidores}"
                                 class="tarjeta-repartidor"
                                 th:data-id="${r.id}"
                                 onclick="vincularRepartidor(this)">
                                <div class="d-flex align-items-center justify-content-between mb-1">
                                    <div class="d-flex align-items-center">
                                        <div class="avatar-sm me-3 d-flex align-items-center justify-content-center"
                                             th:text="${#strings.substring(r.nombre,0,1)}">R</div>
                                        <div>
                                            <h6 class="mb-0 fw-bold nombre-tag" style="font-size: 0.9rem;" th:data-nombre-original="${r.nombre}">[[${r.nombre}]]</h6>
                                            <small class="estado-texto text-success fw-bold">Libre</small>
                                        </div>
                                    </div>
                                    <input type="color"
                                           class="form-control form-control-color border-0 bg-transparent p-0"
                                           th:id="'color-' + ${r.id}"
                                           th:value="${iterStat.index == 0 ? '#933D2D' : (iterStat.index == 1 ? '#1B3A2C' : '#4e73df')}"
                                           title="Color de ruta"
                                           onclick="event.stopPropagation()"
                                           onchange="cambiarColorRepartidor(this)">
                                </div>
                                <div class="contenedor-asignados" th:id="'asignados-rep-' + ${r.id}"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<div class="modal fade" id="modalConfirmar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-dark text-white" style="background-color: var(--lajama-green) !important;">
                <h5 class="modal-title fw-bold" style="font-family: 'Vollkorn';"><i class="bi bi-truck me-2"></i> Confirmar Salida</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>¿Confirmar el despacho de los siguientes pedidos?</p>
                <div id="listaResumen" class="small p-3 rounded" style="background-color: var(--lajama-cream); border: 1px solid var(--lajama-peach);"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary px-4" style="background-color: var(--lajama-brown); border:none;" onclick="ejecutarEnvioFinal()">Confirmar</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const PEDIDOS_DATA = /*[[${pedidosJS}]]*/ [];
    const ORIGEN_COORDS = { lat: -6.787382, lng: -79.842961 };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script th:src="@{/js/despacho-operaciones.js}"></script>

</body>
</html>
