<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Jama - Nueva Comanda</title>

    <th:block th:replace="~{links :: headLinks}"></th:block>
    <link rel="stylesheet" th:href="@{/css/mesero.css}">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{sidebar :: sidebar(activeUri='/admin/mesas')}"></div>

    <main id="main-content" class="main-content w-100 bg-light">
        <header class="header-size m-2 ms-3 me-0 mt-3 p-3">
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-3">
                    <button id="open-sidebar" class="btn btn-light d-md-none">
                        <i class="bi bi-list fs-4"></i>
                    </button>
                    <h4 class="mb-0 fw-bold">Nueva Comanda</h4>
                </div>
            </div>
        </header>

        <div class="container-fluid p-4">
            <div class="comanda-wrapper">
                <div class="productos-seccion">
                    <div class="search-box">
                        <i class="bi bi-search fs-4"></i>
                        <input type="text" id="buscador" class="form-control shadow-sm"
                               placeholder="Buscar plato o bebida..." onkeyup="filtrarProductos()">
                    </div>

                    <div class="row row-cols-1 row-cols-md-3 g-4" id="grid-productos">
                        <div th:each="prod : ${productos}" class="col producto-card">
                            <div class="card h-100 menu-item shadow-sm"
                                 th:data-id="${prod.id}"
                                 th:data-nombre="${prod.nombre}"
                                 th:data-precio="${prod.precio}"
                                 onclick="prepararAgregarAlCarrito(this)">

                                <img th:src="${prod.imagen != null ? '/imagenes/' + prod.imagen : 'https://placehold.co/400x300?text=Sin+Foto'}"
                                     class="card-img-top" alt="Plato">

                                <div class="card-body p-3">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <span class="badge bg-primary-subtle text-primary border-0 px-2" th:text="${prod.categoria.nombre}"></span>
                                        <span class="fw-bold text-success fs-5">S/ [[${#numbers.formatDecimal(prod.precio, 1, 2)}]]</span>
                                    </div>
                                    <h6 class="card-title fw-bold text-dark mb-0 nombre-producto" th:text="${prod.nombre}"></h6>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="carrito-sidebar shadow-sm">
                    <h5 class="fw-bold mb-4 text-dark"><i class="bi bi-bag-check me-2"></i>Detalle de Orden</h5>

                    <div class="mb-3">
                        <div class="form-floating mb-2">
                            <input type="text" id="cliente" class="form-control" placeholder="Mesa">
                            <label for="cliente">Nombre / Mesa</label>
                        </div>
                        <div class="form-floating">
                            <input type="text" id="direccion" class="form-control" value="Atención en Local">
                            <label for="direccion">Tipo de Pedido</label>
                        </div>
                    </div>

                    <div id="lista-items" class="lista-items-scroll">
                    </div>

                    <div class="pt-4 border-top">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <span class="h5 text-muted mb-0">Total</span>
                            <span class="h2 fw-bold text-primary mb-0">S/ <span id="total-monto">0.00</span></span>
                        </div>
                        <button class="btn btn-success btn-lg w-100 py-3 fw-bold shadow-sm" onclick="enviarPedido()">
                            ENVIAR A COCINA
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{links :: scriptLinksPlus}"></th:block>
<script th:src="@{/js/mesero.js}"></script>
</body>
</html>
