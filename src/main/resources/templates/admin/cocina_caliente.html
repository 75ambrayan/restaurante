<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Monitor de Cocina - Estación Caliente - La Jama</title>
    <th:block th:replace="~{links :: headLinks}"></th:block>

    <link rel="stylesheet" th:href="@{/css/cocina-core.css}">
    <link rel="stylesheet" th:href="@{/css/cocina-caliente.css}">
</head>
<body class="cocina-body cocina-caliente">

<div class="wrapper">
    <div th:replace="~{sidebar :: sidebar(activeUri='/admin/cocina/caliente')}"></div>

    <main id="main-content" class="main-content">
        <div th:replace="~{sidebar :: logistica_header('Monitoreo Caliente')}"></div>

        <div class="pedidos-grid-header px-4 mt-3 d-flex justify-content-end">
            <div class="status-badge-jama px-3 py-2 rounded-pill shadow-sm">
                <i class="bi bi-fire me-2"></i> ORDENES PENDIENTES: <span th:text="${#lists.size(pedidos)}">0</span>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(pedidos)}" class="text-center py-5 mt-5 text-muted animate__animated animate__fadeIn">
            <i class="bi bi-clipboard2-check-fill text-warning" style="font-size: 5rem; opacity: 0.8;"></i>
            <h3 class="mt-3 fw-bold text-dark">No hay pedidos recientes</h3>
            <p class="fs-5 text-muted">Los fogones están controlados y al día. ¡Buen trabajo equipo!</p>
        </div>

        <div th:unless="${#lists.isEmpty(pedidos)}" class="pedidos-grid">
            <div th:each="p : ${pedidos}" class="card-pedido">
                <div class="card-header">
                    <span class="badge-id">ORD. #[[${p.id}]]</span>
                    <div class="timer-container" th:data-start="${p.fechaCreacion}">
                        <i class="bi bi-stopwatch me-1"></i>
                        <span class="timer-display">00:00</span>
                    </div>
                </div>

                <div class="card-body">
                    <h5 class="cliente-nombre">Mesa: [[${p.cliente}]]</h5>
                    <div class="items-lista">
                        <div class="item-plato" th:each="d : ${p.getListaDetalles()}"
                             th:if="${d.producto.categoria.nombre.contains('CALIENTE') && !d.cocinado}">
                            <div class="d-flex align-items-center">
                                <span class="item-cantidad">[[${d.cantidad}]]</span>
                                <span class="item-nombre">[[${d.producto.nombre}]]</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-footer">
                    <div class="footer-actions">
                        <a th:href="@{'/admin/cocina/ticket/' + ${p.id} + '/caliente'}" target="_blank" class="btn-printer">
                            <i class="bi bi-printer"></i>
                        </a>
                        <form th:action="@{/admin/cocina/completar}" method="post" class="w-100 m-0">
                            <input type="hidden" name="pedidoId" th:value="${p.id}">
                            <input type="hidden" name="tipoEstacion" value="caliente">
                            <button type="submit" class="btn-despachar">DESPACHAR PLATO</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{links :: scriptLinksPlus}"></th:block>
<script th:src="@{/js/cocina-caliente.js}"></script>
</body>
</html>
