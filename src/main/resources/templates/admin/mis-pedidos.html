<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Entregas | La Jama</title>
    <th:block th:replace="~{links :: headLinks}"></th:block>
    <link rel="stylesheet" th:href="@{/css/cocina-core.css}">
    <link rel="stylesheet" th:href="@{/css/entregas.css}">
</head>
<body class="cocina-body">

<div class="wrapper">
    <div th:replace="~{sidebar :: sidebar(activeUri='/admin/entregas/mis-pedidos')}"></div>

    <main class="main-content">
        <header class="estacion-header shadow-sm mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <h2><i class="bi bi-bicycle me-2"></i> RUTA DE ENTREGA</h2>
                <div class="badge bg-white text-dark border p-2">
                    REPARTIDOR: <span th:text="${nombreRepartidor}" class="fw-bold">Nombre</span>
                </div>
            </div>
        </header>

        <div class="container-fluid px-4">
            <div th:if="${#lists.isEmpty(pedidos)}" class="text-center py-5 opacity-50">
                <i class="bi bi-box2-heart" style="font-size: 4rem; color: var(--lajama-dark);"></i>
                <h3 class="mt-3" style="font-family: 'Vollkorn';">¡Todo entregado!</h3>
                <p>No tienes pedidos pendientes por ahora.</p>
            </div>

            <div class="row g-4">
                <div th:each="pedido : ${pedidos}" class="col-12 col-md-6 col-lg-4">
                    <div class="card card-delivery shadow-sm h-100">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between mb-3">
                                <span class="badge-id">ORDEN #[[${pedido.id}]]</span>
                                <span class="badge bg-light text-dark border small" th:text="${pedido.estado}"></span>
                            </div>

                            <h5 class="cliente-nombre mb-1">[[${pedido.cliente}]]</h5>
                            <p class="text-muted small mb-3"><i class="bi bi-geo-alt-fill text-danger"></i> [[${pedido.direccion}]]</p>

                            <div class="h4 fw-bold mb-4 text-brown">S/ [[${pedido.montoTotal}]]</div>

                            <div class="d-grid gap-2">
                                <button th:if="${pedido.estado.name() == 'PREPARADO' or pedido.estado.name() == 'ASIGNADO'}"
                                        th:onclick="'cambiarEstadoPedido(' + ${pedido.id} + ', \'iniciar\')'"
                                        class="btn btn-jama-dark">
                                    INICIAR RUTA
                                </button>

                                <button th:if="${pedido.estado.name() == 'EN_CAMINO'}"
                                        th:onclick="'cambiarEstadoPedido(' + ${pedido.id} + ', \'completar\')'"
                                        class="btn btn-success fw-bold py-2">
                                    FINALIZAR ENTREGA
                                </button>

                                <a th:href="'https://www.google.com/maps/search/?api=1&query=' + ${pedido.latitud} + ',' + ${pedido.longitud}"
                                   target="_blank" class="btn btn-link btn-sm text-decoration-none text-muted mt-2">
                                    <i class="bi bi-map"></i> Ver ubicación en GPS
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{links :: scriptLinksPlus}"></th:block>
<script th:src="@{/js/entregas.js}"></script>
</body>
</html>
