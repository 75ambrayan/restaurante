<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Menú - La Jama</title>
    <th:block th:replace="~{links :: headLinks}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin_productos.css}">
</head>
<body class="bg-light">

<div class="wrapper">
    <div th:replace="~{sidebar :: sidebar(activeUri='/admin/productos')}"></div>

    <main class="main-content">
        <div th:replace="~{sidebar :: logistica_header('Gestión de Productos')}"></div>

        <div class="container-fluid py-4 px-4">
            <div class="card card-jama shadow-sm border-0 rounded-4">
                <div class="card-header bg-white d-flex justify-content-between align-items-center py-3 border-bottom">
                    <h4 class="mb-0 fw-bold text-jama-green"><i class="bi bi-egg-fried me-2"></i> Lista de Productos del Menú</h4>
                    <button class="btn btn-jama rounded-pill px-4" onclick="abrirModalNuevo()">
                        <i class="bi bi-plus-circle me-2"></i> Nuevo Plato
                    </button>
                </div>

                <div class="card-body p-4">
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <div class="input-group search-group-jama">
                                <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search"></i></span>
                                <input type="text" id="busqueda" class="form-control border-start-0 input-jama" placeholder="Buscar plato o categoría..." onkeyup="filtrarTabla()">
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle" id="tablaProductos">
                            <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Producto</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Estado</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="p : ${productos}">
                                <td>
                                    <img th:src="${p.imagen != null ? '/imagenes/' + p.imagen : '/img/no-photo.png'}"
                                         class="img-thumbnail rounded-3 shadow-sm img-producto-jama">
                                </td>
                                <td>
                                    <span class="d-block fw-bold text-dark">[[${p.nombre}]]</span>
                                    <small class="text-muted d-block text-truncate" style="max-width: 250px;">[[${p.descripcion}]]</small>
                                </td>
                                <td>
                                        <span th:class="${p.categoria.nombre.contains('FRÍA') || p.categoria.nombre.contains('FRIO') ? 'badge badge-frio' : 'badge badge-caliente'}">
                                            [[${p.categoria.nombre}]]
                                        </span>
                                </td>
                                <td class="fw-bold text-ocre">S/ [[${#numbers.formatDecimal(p.precio, 1, 2)}]]</td>
                                <td>
                                        <span th:class="${p.stock <= 5 ? 'badge badge-stock-low' : 'badge badge-stock-ok'}">
                                            [[${p.stock}]] uds
                                        </span>
                                </td>
                                <td>
                                    <div class="form-check form-switch custom-switch-jama">
                                        <input class="form-check-input" type="checkbox" th:checked="${p.estado == 1}"
                                               th:onchange="'cambiarEstado(' + ${p.id} + ', this)'">
                                    </div>
                                </td>
                                <td class="text-center">
                                    <button class="btn btn-action-jama btn-edit me-1" th:onclick="'editarProducto(' + ${p.id} + ')'">
                                        <i class="bi bi-pencil-square"></i>
                                    </button>
                                    <button class="btn btn-action-jama btn-delete" th:onclick="'eliminarProducto(' + ${p.id} + ')'">
                                        <i class="bi bi-trash3"></i>
                                    </button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="modal fade" id="modalProducto" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow-lg">
            <form id="formProducto" th:action="@{/admin/productos/guardar}" method="post" enctype="multipart/form-data">
                <div class="modal-header text-white">
                    <h5 class="modal-title fw-bold" id="modalTitulo">Nuevo Producto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 bg-jama-cream-modal">
                    <input type="hidden" id="prodId" name="id">
                    <div class="row g-4">
                        <div class="col-md-4 text-center border-end border-peach-light">
                            <label class="form-label fw-bold text-jama-green">Imagen del Plato</label>
                            <div class="preview-container mb-3 shadow-sm mx-auto">
                                <img id="imgPrevia" th:src="@{/img/no-photo.png}" class="img-fluid rounded-3 img-preview-box">
                            </div>
                            <input type="file" name="archivoImagen" class="form-control form-control-sm file-input-jama" accept="image/*" onchange="previewImage(event)">
                        </div>
                        <div class="col-md-8">
                            <div class="mb-3">
                                <label class="form-label fw-bold small text-jama-green">Nombre del Plato</label>
                                <input type="text" id="prodNombre" name="nombre" class="form-control rounded-3 input-jama" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small text-jama-green">Descripción</label>
                                <textarea id="prodDesc" name="descripcion" class="form-control rounded-3 input-jama" rows="2"></textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold small text-jama-green">Precio (S/)</label>
                                    <input type="number" id="prodPrecio" name="precio" class="form-control rounded-3 input-jama" step="0.01" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold small text-jama-green">Stock</label>
                                    <input type="number" id="prodStock" name="stock" class="form-control rounded-3 input-jama" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold small text-jama-green">Categoría</label>
                                    <select id="prodCat" name="categoria.id" class="form-select rounded-3 input-jama" required>
                                        <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 bg-light-footer">
                    <button type="button" class="btn btn-outline-jama-green rounded-pill px-4" data-bs-dismiss="modal">Cerrar</button>
                    <button type="submit" class="btn btn-jama rounded-pill px-4">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block th:replace="~{links :: scriptLinksPlus}"></th:block>
<script th:src="@{/js/admin_productos.js}"></script>
</body>
</html>
