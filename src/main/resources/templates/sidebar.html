<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- COMPONENTE 1: EL MENU LATERAL ORIGINAL (SIN TOCAR NADA) -->
<div th:fragment="sidebar(activeUri)">
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <nav id="sidebar" class="sidebar p-3">
        <div class="text-center mb-4 px-3 pt-4 position-relative">
            <a th:href="@{/dashboard}" class="text-decoration-none d-inline-block">
                <img th:src="@{/img/logo.png}" alt="Logo La Jama"
                     style="width: 180px; max-width: 100%; height: auto; object-fit: contain;">
            </a>

            <button id="close-sidebar" class="btn text-white d-md-none p-0 position-absolute" style="top: 15px; right: 15px;">
                <i class="bi bi-x-lg" style="font-size: 1.2rem;"></i>
            </button>
        </div>

        <hr class="text-white-50" />

        <div class="flex-grow-1 overflow-auto">
            <ul class="nav nav-pills flex-column mb-auto">
                <li th:each="opcion : ${session.opcionesIndependientes}" class="mb-1">
                    <a th:href="@{${opcion.ruta}}"
                       class="nav-link text-sidebar-color d-flex align-items-center"
                       th:classappend="${opcion.ruta == activeUri} ? 'active' : ''">
                        <i class="bi bi-circle-fill me-2" style="font-size: 0.5rem;"></i>
                        <span th:text="${opcion.nombre}"></span>
                    </a>
                </li>

                <li class="nav-item mb-1" th:each="grupo : ${session.menuAgrupado.entrySet()}">
                    <th:block th:with="isGroupActive=${grupo.value.?[ruta == #activeUri].size() > 0}">
                        <a class="nav-link text-sidebar-color d-flex justify-content-between align-items-center"
                           data-bs-toggle="collapse"
                           th:href="@{'#collapse-' + ${grupo.key}}"
                           th:aria-expanded="${isGroupActive}"
                           th:classappend="${!isGroupActive} ? 'collapsed' : ''">
                            <span th:text="${grupo.key}"></span>
                            <i class="bi bi-chevron-down small"></i>
                        </a>

                        <div th:id="@{'collapse-' + ${grupo.key}}"
                             class="collapse"
                             th:classappend="${isGroupActive} ? 'show' : ''">
                            <ul class="nav flex-column ps-3 mt-1">
                                <li th:each="opcion : ${grupo.value}">
                                    <a th:href="@{${opcion.ruta}}"
                                       class="nav-link text-sidebar-color rounded-pill mb-1 small"
                                       th:classappend="${opcion.ruta == activeUri} ? 'active-submenu' : ''">
                                        <span th:text="${opcion.nombre}"></span>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </th:block>
                </li>
            </ul>
        </div>

        <div class="mt-auto">
            <hr class="text-white-50" />
            <a href="/logout" class="nav-link text-sidebar-color d-flex align-items-center py-3">
                <i class="bi bi-box-arrow-left me-2"></i>
                <span>Cerrar Sesión</span>
            </a>
        </div>
    </nav>
</div>


<!-- COMPONENTE 2: EL BANNER DE CABECERA CON NUESTRO BANNER.PNG -->
<header th:fragment="logistica_header(titulo)" class="main-header-banner">
    <div class="header-title-container">
        <h2 class="header-title fs-5" th:text="${titulo}">La Jama</h2>
    </div>

    <div class="d-flex gap-2">
        <!-- Botón dinámico para la vista de Despacho / Rutas -->
        <button th:if="${titulo == 'Monitor de Rutas'}"
                class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm"
                style="background-color: var(--lajama-brown); border:none;"
                onclick="abrirConfirmacion()">
            Confirmar Despacho <i class="bi bi-send-fill ms-2"></i>
        </button>

        <!-- Botón dinámico para la vista de Usuarios -->
        <button th:if="${titulo == 'Gestión de Usuarios'}"
                id="btnNuevoRegistro"
                class="btn btn-success rounded-pill px-4 fw-bold shadow-sm">
            Nuevo Registro <i class="bi bi-plus ms-2"></i>
        </button>
    </div>
</header>

</body>
</html>
